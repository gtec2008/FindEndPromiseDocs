site_name: FindEndPromise Help Center
site_description: คู่มือการใช้งาน FindEndPromise Auto Update
site_author: Grand Pest Control
site_url: https://gtec2008.github.io/autoupdate-help/

repo_url: https://github.com/gtec2008/autoupdate-help
repo_name: gtec2008/autoupdate-help

use_directory_urls: true

theme:
  name: material
  language: th
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.suggest
    - content.code.copy
  palette:
    - scheme: default
      primary: blue
      accent: amber
      toggle:
        icon: material/weather-night
        name: เปลี่ยนเป็นโหมดมืด
    - scheme: slate
      primary: blue
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: เปลี่ยนเป็นโหมดสว่าง

nav:
  - หน้าแรก: index.md
  - เริ่มต้นใช้งาน: getting-started.md
  - Auto Update: autoupdate.md
  - Backup และ Restore: backup-and-restore.md
  - Error Code: error-code.md
  - FAQ: faq.md
  - Changelog: changelog.md

plugins:
  - search:
      lang:
        - en

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
